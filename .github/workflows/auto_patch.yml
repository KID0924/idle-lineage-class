# 3. 執行 Python 腳本，精準注入動態版號與刷新快取
      - name: 💉 注入動態版號外掛與刷新快取
        run: |
          cat << 'EOF' > inject.py
          import re, time

          # 🌟 神級黑科技：抓取機器人當下的時間，產生絕對不重複的版號 (例如 202606171706)
          dynamic_v = time.strftime("%Y%m%d%H%M")

          # 【任務 A：注入外掛並打上全新版號】
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # 注意這裡用 Python 的 f-string，把 {dynamic_v} 動態塞進網址裡
          inject_code = f'''
          <script src="https://pp771007.github.io/idle-lineage-class/afk-offline.js?v={dynamic_v}"></script>
          <script src="https://pp771007.github.io/idle-lineage-class/afk-mobile.js?v={dynamic_v}"></script>
          <script src="https://pp771007.github.io/idle-lineage-class/afk-dex.js?v={dynamic_v}"></script>
          <script src="https://pp771007.github.io/idle-lineage-class/afk-wiki.js?v={dynamic_v}"></script>
          <script src="https://pp771007.github.io/idle-lineage-class/afk-fixes.js?v={dynamic_v}"></script>
          <script src="klh_jsonblob.js?v={dynamic_v}"></script>
          <script src="klh_GM.js?v={dynamic_v}"></script>
          <script src="klh_GM2.js?v={dynamic_v}"></script>
          '''

          if 'klh_jsonblob.js' not in content:
              content = content.replace('</body>', inject_code + '\n</body>')
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f'✅ 成功注入外掛！所有腳本已掛上最新版號 v={dynamic_v}')
          else:
              print('⚠️ 偵測到外掛已存在，跳過 html 注入步驟。')

          # 【任務 B：強制刷新 Service Worker (sw.js) 讓新地圖/新圖檔生效】
          try:
              with open('sw.js', 'r', encoding='utf-8') as f:
                  sw_content = f.read()
              
              # 用正則表達式，把原作者寫死的 CACHE_NAME 無情換成我們的新時間版號
              sw_content = re.sub(
                  r"(const|let|var)\s+CACHE_NAME\s*=\s*['\"].*?['\"]", 
                  f"\\1 CACHE_NAME = 'v{dynamic_v}'", 
                  sw_content
              )
              
              with open('sw.js', 'w', encoding='utf-8') as f:
                  f.write(sw_content)
              print(f'✅ 成功攔截 sw.js！背景圖與素材快取已強制作廢，新版號為 v{dynamic_v}')
          except FileNotFoundError:
              print('找不到 sw.js，跳過快取刷新。')

          EOF
          
          python3 inject.py
          rm inject.py
