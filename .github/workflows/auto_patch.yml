name: 🚀 自動同步並注入外掛

# 設定觸發條件
on:
  schedule:
    - cron: '7,22,37,52 * * * *' # 每 15 分鐘自動執行一次巡邏
  workflow_dispatch:    # 允許在 GitHub 網頁上隨時手動點擊更新

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      
      # 1. 複製基地的現有檔案
      - name: 📥 複製我的基地儲存庫
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2. 🌟 檢查原作者進度 (手動觸發直接暴力覆蓋！)
      - name: 🕵️‍♀️ 檢查原作者是否有新進度
        run: |
          git clone --depth=1 https://github.com/shines871/idle-lineage-class.git upstream_check
          UPSTREAM_HASH=$(git -C upstream_check rev-parse HEAD)
          echo "原作者最新版號: $UPSTREAM_HASH"
          
          # 檢查是不是手動按按鈕觸發的
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "🤘 偵測到手動觸發！不管原版有沒有更新，直接暴力覆蓋！"
            echo "$UPSTREAM_HASH" > .last_sync_hash
            rsync -av --exclude='.git' --exclude='.github' upstream_check/ .
            echo "SKIP_UPDATE=false" >> $GITHUB_ENV
          elif [ -f ".last_sync_hash" ] && [ "$UPSTREAM_HASH" == "$(cat .last_sync_hash)" ]; then
            echo "🥱 原作者根本沒動靜，機器人繼續躺平！"
            echo "SKIP_UPDATE=true" >> $GITHUB_ENV
          else
            echo "🔥 發現新版本！開始準備同步與覆蓋..."
            echo "$UPSTREAM_HASH" > .last_sync_hash
            rsync -av --exclude='.git' --exclude='.github' upstream_check/ .
            echo "SKIP_UPDATE=false" >> $GITHUB_ENV
          fi
          
          rm -rf upstream_check

      # 3. 執行 Python 腳本（注入動態版號、時間戳記與外掛）
      - name: 💉 注入動態版號、時間戳記與外掛
        if: env.SKIP_UPDATE != 'true'
        run: |
          cat << 'EOF' > inject.py
          import re, time, datetime

          dynamic_v = time.strftime("%Y%m%d%H%M")
          
          # 手動加 8 小時換算成台灣時間
          tw_time = datetime.datetime.utcnow() + datetime.timedelta(hours=8)
          sync_str = tw_time.strftime("%Y/%m/%d %H:%M")

          # 【任務 A】
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          inject_code = f'''
          <!-- pp771007 -->
          <!-- 離線掛機外掛(可獨立維護;原作者更新後重新加回此行即可) -->
          <script src="https://pp771007.github.io/idle-lineage-class/afk-offline.js?v={dynamic_v}"></script>
          <!-- 手機版介面外掛(可獨立維護;原作者更新後重新加回此行即可) -->      
          <script src="https://pp771007.github.io/idle-lineage-class/afk-mobile.js?v={dynamic_v}"></script>
          <!-- 怪物/掉落查詢外掛(可獨立維護;原作者更新後重新加回此行即可) -->
          <script src="https://pp771007.github.io/idle-lineage-class/afk-dex.js?v={dynamic_v}"></script>
          <!-- 小百科外掛(專精/武器特性/職業魔法;可獨立維護,原作者更新後重新加回此行即可) -->
          <script src="https://pp771007.github.io/idle-lineage-class/afk-wiki.js?v={dynamic_v}"></script>
          <!-- 通用修正外掛(補原作者坑,桌機/手機通用;可獨立維護,原作者更新後重新加回此行即可) -->
          <script src="https://pp771007.github.io/idle-lineage-class/afk-fixes.js?v={dynamic_v}"></script>
          <!-- 背景大圖快取 Service Worker 註冊(可獨立維護;原作者更新後重新加回此行即可) -->
          <script src="https://pp771007.github.io/idle-lineage-class/afk-sw.js?v={dynamic_v}"></script>
          <!-- 手機 toast 提示(點按鈕的系統日誌訊息浮現;可獨立維護,原作者更新後重新加回此行即可) -->
          <script src="https://pp771007.github.io/idle-lineage-class/afk-toast.js?v={dynamic_v}"></script>

          <!-- KID0924 -->
          <!-- Json雲端模組 -->
          <script src="klh_jsonblob.js?v={dynamic_v}"></script>
          <!-- 潘朵拉抽獎模組 -->
          <script src="klh_GM.js?v={dynamic_v}"></script>
          <!-- 自定義藥水與兌換模組 -->
          <script src="klh_GM2.js?v={dynamic_v}"></script>
          <!-- 黃金交易所/雲端資源商店模組 -->
          <script src="klh_Shop.js?v={dynamic_v}"></script>
           <!-- 傭兵生存戰鬥血魔擴充模組 -->
          <script src="klh_team.js?v={dynamic_v}"></script>

          <script>
            document.addEventListener("DOMContentLoaded", function() {{
              let menu = document.getElementById('main-menu');
              if (menu) {{
                let footer = document.createElement('div');
                footer.style.color = '#64748b';
                footer.style.fontSize = '12px';
                footer.style.textAlign = 'center';
                footer.style.letterSpacing = '0.3px';
                footer.style.marginTop = '10px';
                footer.style.lineHeight = '1.6';
                
                footer.innerHTML = '原作者：秋玥 <span style="margin:0 6px;opacity:0.6;">·</span> 原版最後同步：{sync_str}';
                menu.appendChild(footer);
              }} else {{
                console.warn("找不到 #main-menu，時間戳記外掛潛水去啦~");
              }}
            }});
          </script>
          '''

          if 'klh_jsonblob.js' not in content:
              content = content.replace('</body>', inject_code + '\n</body>')
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f'✅ 成功注入外掛！並掛上時間戳記：{sync_str}')
          else:
              print('⚠️ 偵測到外掛已存在，跳過 html 注入步驟。')

          # 【任務 B】
          try:
              with open('sw.js', 'r', encoding='utf-8') as f:
                  sw_content = f.read()
              
              sw_content = re.sub(
                  r"(const|let|var)\s+CACHE_NAME\s*=\s*['\"].*?['\"]", 
                  f"\\1 CACHE_NAME = 'v{dynamic_v}'", 
                  sw_content
              )
              
              with open('sw.js', 'w', encoding='utf-8') as f:
                  f.write(sw_content)
              print(f'✅ sw.js 快取刷新成功！')
          except FileNotFoundError:
              print('找不到 sw.js，跳過快取刷新。')

          EOF
          
          python3 inject.py
          rm inject.py

      # 4. 把組裝完成的程式碼推回 GitHub
      - name: 📤 存檔並推回我的 GitHub 倉庫
        if: env.SKIP_UPDATE != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff-index --quiet HEAD; then
            echo "🥱 其實沒有檔案變動，收工！"
            exit 0
          fi
          
          ADDED_COUNT=$(git diff --cached --name-status | grep -iE '^A.*\.(png|jpg|jpeg|gif|webp)$' | wc -l | tr -d ' ')
          MODIFIED_COUNT=$(git diff --cached --name-status | grep -iE '^M.*\.(png|jpg|jpeg|gif|webp)$' | wc -l | tr -d ' ')
          
          COMMIT_MSG="chore(sync): 自動同步原作者最新 index.html(新增 $ADDED_COUNT 張、更新 $MODIFIED_COUNT 張)"
          
          echo "🔥 準備送出的 Commit 訊息：$COMMIT_MSG"
          git commit -m "$COMMIT_MSG"
          git push
